name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Compile firmware (firmware/arp)
        run: |
          if [ -f firmware/arp/platformio.ini ]; then
            pio run -d firmware/arp
          else
            echo "firmware/arp/platformio.ini not present yet."
          fi

      - name: Run host tests (firmware/arp)
        run: |
          if [ -d firmware/arp/test ] && grep -q '\[env:native\]' firmware/arp/platformio.ini 2>/dev/null; then
            pio test -d firmware/arp -e native
          else
            echo "No host tests yet — Story 003 will add them."
          fi
