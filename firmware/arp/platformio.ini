; PlatformIO project for the xiao-ra4m1-arp firmware.
; See docs/decisions.md §2 (toolchain) and docs/stories/ for the roadmap.

[platformio]
default_envs = seeed-xiao-ra4m1

[env:seeed-xiao-ra4m1]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-ra4m1
framework = arduino
monitor_speed = 115200
; On-device tests deferred; pure-logic modules tested on host via [env:native]
test_ignore = *

[env:native]
platform = native
test_framework = googletest
build_flags = -std=c++17 -Wall -Wextra
